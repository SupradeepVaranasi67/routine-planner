apiVersion: apps/v1
kind: Deployment
metadata:
  name: routine-planner
spec:
  replicas: 2

  selector:
    matchLabels:
      app: routine-planner

  template:
    metadata:
      labels:
        app: routine-planner

    spec:
      containers:
        - name: routine-planner
          image: supradeep748/routine-planner:v1

          ports:
            - containerPort: 80
